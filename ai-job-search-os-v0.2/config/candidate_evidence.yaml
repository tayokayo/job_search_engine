prohibited_inferences:
  - Do not describe functional Japanese or Mandarin as business-level fluency.
  - Do not claim paid-acquisition, SEO, AEO, or growth-marketing ownership.
  - Do not claim P&L, budget, board, or people-management scope without new evidence.
  - Do not claim machine-learning or software-engineering leadership.
  - Do not attribute company-wide results solely to the candidate when the source says contributed to, advised, supported, or collaborated.
  - Do not round, combine, annualize, or extrapolate metrics.

maintenance:
  update_method: Human-reviewed amendment only
  required_for_new_claim:
