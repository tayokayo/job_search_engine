schema_version: "1.1"
artifact_type: candidate_evidence
candidate_id: tayo_kayode
candidate_name: Tayo Kayode
canonical: true
evidence_policy:
  purpose: >-
    Canonical source of candidate facts for opportunity scoring, resume tailoring,
    outreach drafting, and interview preparation.
  default_claim_status: unsupported
  permitted_claim_statuses:
    - verified
    - derived
    - unsupported
  generation_rules:
    - Use verified claims directly, without increasing their scope.
    - Use derived claims only when clearly presented as synthesis or positioning.
    - Never present unsupported requirements as candidate experience.
    - Preserve dates, units, qualifiers, and metric boundaries exactly.
    - Do not infer team size, budget, P&L ownership, reporting line, hiring authority, or technical depth.
    - Do not convert collaboration or advisory work into sole ownership.
    - If a required fact is absent, flag an evidence gap and request confirmation.
  provenance_rules:
    - Every candidate narrative claim intended for external use must have a unique claim_id.
    - Every derived claim must declare derived_from_claim_ids containing exact upstream claim IDs.
    - Parent evidence IDs and prose explanations are not sufficient provenance for a derived claim.
    - Derived-claim provenance must form an acyclic graph terminating only in verified claims.
    - A derived claim cannot broaden the scope, attribution, metrics, or certainty of its upstream claims.

